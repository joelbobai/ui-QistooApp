<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EthiCash – Splash Screen</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#0d1710;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Plus Jakarta Sans',sans-serif;}

  .device{width:402px;height:874px;background:#111;border-radius:54px;box-shadow:0 0 0 2px #3a3a3a,0 0 0 6px #1a1a1a,0 30px 80px rgba(0,0,0,.6);position:relative;overflow:hidden;flex-shrink:0;}
  .status-bar{position:absolute;top:0;left:0;right:0;height:54px;z-index:100;display:flex;align-items:flex-end;justify-content:space-between;padding:0 28px 6px;pointer-events:none;}
  .status-time{font-family:'Inter',sans-serif;font-weight:700;font-size:15px;color:white;text-shadow:0 1px 3px rgba(0,0,0,.4);}
  .status-icons{display:flex;gap:6px;align-items:center;}
  .dynamic-island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:126px;height:37px;background:#000;border-radius:20px;z-index:101;}
  .screen{position:absolute;inset:0;border-radius:54px;overflow:hidden;}
  .home-indicator{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(255,255,255,.35);border-radius:3px;z-index:100;pointer-events:none;}

  /* Splash */
  .splash{width:100%;height:100%;background:#1A6B3C;position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .corner-pattern{position:absolute;pointer-events:none;}
  .splash-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(201,146,26,.13) 0%,transparent 70%);pointer-events:none;}
  .splash-content{display:flex;flex-direction:column;align-items:center;gap:0;position:relative;z-index:2;}
  .splash-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:38px;color:#fff;letter-spacing:-.5px;line-height:1;margin-bottom:10px;margin-top:18px;}
  .splash-title span{color:#F0C040;}
  .splash-subtitle{font-family:'Plus Jakarta Sans',sans-serif;font-style:italic;font-weight:400;font-size:16px;color:#fff;opacity:.7;letter-spacing:.3px;}
  .splash-footer{position:absolute;bottom:50px;display:flex;flex-direction:column;align-items:center;gap:10px;}
  .loading-track{width:120px;height:3px;border-radius:100px;background:rgba(255,255,255,.15);overflow:hidden;}
  .loading-bar{height:100%;background:#F0C040;border-radius:100px;box-shadow:0 0 8px rgba(240,192,64,.5);width:0;animation:loadprogress 2.8s linear forwards;}
  .splash-powered{font-family:'Inter',sans-serif;font-size:11px;color:#fff;opacity:.4;letter-spacing:.2px;}

  @keyframes loadprogress{from{width:0}to{width:100%}}
</style>
</head>
<body>
<div class="device">
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="white" opacity=".9"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="4.5" y="5" width="3" height="7" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
      <svg width="16" height="11" viewBox="0 0 24 18" fill="white" opacity=".9"><path d="M12 14a2 2 0 110 4 2 2 0 010-4z"/><path d="M5 9.5C7.5 7 10 5.5 12 5.5s4.5 1.5 7 4"/><path d="M1.5 6C5 2.5 8.5.5 12 .5s7 2 10.5 5.5"/></svg>
      <div style="display:flex;align-items:center;gap:1px;">
        <div style="width:25px;height:12px;border:1.5px solid rgba(255,255,255,.9);border-radius:3px;padding:1.5px;display:flex;align-items:center;">
          <div style="width:80%;height:100%;background:white;border-radius:1.5px;"></div>
        </div>
        <div style="width:2.5px;height:6px;background:rgba(255,255,255,.6);border-radius:0 1px 1px 0;"></div>
      </div>
    </div>
  </div>
  <div class="dynamic-island"></div>
  <div class="screen">
    <div class="splash">
      <!-- Corner patterns (top-right) -->
      <div class="corner-pattern" style="top:-30px;right:-30px;">
        <svg id="cp1" width="240" height="240" viewBox="0 0 200 200" style="opacity:.08;"></svg>
      </div>
      <!-- Corner pattern (bottom-left, flipped) -->
      <div class="corner-pattern" style="bottom:-30px;left:-30px;">
        <svg id="cp2" width="240" height="240" viewBox="0 0 200 200" style="opacity:.08;transform:rotate(180deg);"></svg>
      </div>
      <div class="splash-glow"></div>
      <div class="splash-content">
        <svg id="islamic-star" width="108" height="108" viewBox="0 0 108 108"></svg>
        <div class="splash-title">Ethi<span>Cash</span></div>
        <div class="splash-subtitle">Finance with Purpose</div>
      </div>
      <div class="splash-footer">
        <div class="loading-track"><div class="loading-bar"></div></div>
        <div class="splash-powered">Powered by Upscale Strategy</div>
      </div>
    </div>
  </div>
  <div class="home-indicator"></div>
</div>

<script>
function drawIslamicStar(svgId, size, color, opacity=1) {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  const s = size/2, outerR = s*0.9, innerR = s*0.37;
  const pts = Array.from({length:8},(_,i)=>{
    const o=(i*45-90)*Math.PI/180, inn=((i+0.5)*45-90)*Math.PI/180;
    return `${s+outerR*Math.cos(o)},${s+outerR*Math.sin(o)} ${s+innerR*Math.cos(inn)},${s+innerR*Math.sin(inn)}`;
  }).join(' ');
  const oct = Array.from({length:8},(_,i)=>{
    const a=(i*45-22.5)*Math.PI/180;
    return `${s+s*0.4*Math.cos(a)},${s+s*0.4*Math.sin(a)}`;
  }).join(' ');
  svg.style.opacity = opacity;
  svg.innerHTML = `
    <circle cx="${s}" cy="${s}" r="${s*0.94}" fill="none" stroke="${color}" stroke-width="0.6" stroke-opacity="0.25"/>
    <polygon points="${pts}" fill="${color}" fill-opacity="0.15" stroke="${color}" stroke-width="1"/>
    <polygon points="${oct}" fill="${color}" fill-opacity="0.22" stroke="${color}" stroke-width="0.8"/>
    <circle cx="${s}" cy="${s}" r="${s*0.16}" fill="${color}" fill-opacity="0.55"/>
    <circle cx="${s}" cy="${s}" r="${s*0.07}" fill="${color}"/>
    ${Array.from({length:8},(_,i)=>{const a=(i*45-90)*Math.PI/180;return `<line x1="${s}" y1="${s}" x2="${s+outerR*0.68*Math.cos(a)}" y2="${s+outerR*0.68*Math.sin(a)}" stroke="${color}" stroke-width="0.5" stroke-opacity="0.35"/>`;}).join('')}
  `;
}

function drawCornerPattern(svgId, color='#C9921A') {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  const positions = [[-20,-20],[60,-20],[140,-20],[-20,60],[60,60],[140,60],[-20,140],[60,140],[140,140]];
  const r=34, ir=13;
  svg.innerHTML = positions.map(([x,y])=>{
    const p = Array.from({length:8},(_,k)=>{
      const o=(k*45-90)*Math.PI/180, inn=((k+0.5)*45-90)*Math.PI/180;
      return `${x+r*Math.cos(o)},${y+r*Math.sin(o)} ${x+ir*Math.cos(inn)},${y+ir*Math.sin(inn)}`;
    }).join(' ');
    return `<polygon points="${p}" fill="${color}" stroke="${color}" stroke-width="0.5" stroke-opacity="0.4" fill-opacity="0.35"/>`;
  }).join('');
}

drawIslamicStar('islamic-star', 108, '#C9921A');
drawCornerPattern('cp1');
drawCornerPattern('cp2');
</script>
</body>
</html>
