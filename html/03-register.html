<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EthiCash – Register</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d1710;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.device{width:402px;height:874px;background:#fff;border-radius:54px;box-shadow:0 0 0 2px #3a3a3a,0 0 0 6px #1a1a1a,0 30px 80px rgba(0,0,0,.6);position:relative;overflow:hidden;}
.dynamic-island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:126px;height:37px;background:#000;border-radius:20px;z-index:101;}
.home-indicator{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(0,0,0,.18);border-radius:3px;z-index:100;}
.screen{position:absolute;inset:0;border-radius:54px;overflow:hidden;overflow-y:auto;padding-top:60px;padding-bottom:20px;}
.inner{padding:12px 24px 24px;display:flex;flex-direction:column;}

.logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;padding-top:4px;}
.logo-text{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:20px;color:#1C1C1E;}
.logo-text span{color:#C9921A;}
.heading{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:26px;color:#1C1C1E;margin-bottom:6px;line-height:34px;}
.subhead{font-family:'Inter',sans-serif;font-size:13px;color:#9B9B9B;margin-bottom:24px;}

.field-wrap{display:flex;flex-direction:column;gap:14px;}
.field{display:flex;flex-direction:column;gap:5px;}
.field label{font-family:'Inter',sans-serif;font-weight:500;font-size:13px;color:#1C1C1E;}
.field label span{color:#9B9B9B;font-weight:400;}
.input-box{display:flex;align-items:center;background:#F2F2F2;border-radius:10px;height:56px;border:1.5px solid transparent;overflow:hidden;}
.input-box:focus-within{border-color:#27AE60;box-shadow:0 0 0 3px rgba(39,174,96,.1);background:#F2F2F2;}
.prefix{display:flex;align-items:center;gap:6px;padding:0 10px 0 14px;border-right:1px solid #E0E0E0;height:60%;flex-shrink:0;}
.prefix span{font-family:'Inter',sans-serif;font-size:13px;color:#1C1C1E;font-weight:500;}
.input-box input{flex:1;height:100%;background:transparent;border:none;outline:none;padding:0 16px;font-family:'Inter',sans-serif;font-size:14px;color:#1C1C1E;}
.input-box input.with-prefix{padding:0 12px;}
.eye-btn{background:none;border:none;cursor:pointer;padding:0 14px;color:#9B9B9B;display:flex;align-items:center;}

.terms{font-family:'Inter',sans-serif;font-size:12px;color:#9B9B9B;text-align:center;margin-top:14px;line-height:18px;}
.terms span{color:#27AE60;font-weight:500;cursor:pointer;}
.btn-primary{width:100%;height:56px;border-radius:12px;background:#1A6B3C;border:none;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:16px;cursor:pointer;margin-top:18px;box-shadow:0 4px 16px rgba(26,107,60,.3);}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;}
.divider-line{flex:1;height:1px;background:#E8E8E8;}
.divider span{font-family:'Inter',sans-serif;font-size:12px;color:#9B9B9B;white-space:nowrap;}
.btn-google{width:100%;height:56px;border-radius:12px;background:#fff;border:1.5px solid #D9D9D9;color:#1C1C1E;font-family:'Plus Jakarta Sans',sans-serif;font-weight:600;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;}
.login-link{text-align:center;margin-top:20px;margin-bottom:8px;font-family:'Inter',sans-serif;font-size:14px;color:#9B9B9B;}
.login-link span{color:#27AE60;font-weight:700;cursor:pointer;}
</style>
</head>
<body>
<div class="device">
  <div class="dynamic-island"></div>
  <div class="screen">
    <div class="inner">
      <div class="logo">
        <svg id="logo-star" width="28" height="28" viewBox="0 0 28 28"></svg>
        <span class="logo-text">Ethi<span>Cash</span></span>
      </div>
      <div class="heading">Create Your Account</div>
      <div class="subhead">Join thousands accessing ethical finance</div>

      <div class="field-wrap">
        <div class="field">
          <label>Full Name</label>
          <div class="input-box"><input type="text" placeholder="Enter your full name"></div>
        </div>
        <div class="field">
          <label>Phone Number</label>
          <div class="input-box">
            <div class="prefix"><span>🇳🇬</span><span>+234</span></div>
            <input type="tel" class="with-prefix" placeholder="0801 234 5678">
          </div>
        </div>
        <div class="field">
          <label>Email Address <span>(Optional)</span></label>
          <div class="input-box"><input type="email" placeholder="you@example.com"></div>
        </div>
        <div class="field">
          <label>Password</label>
          <div class="input-box">
            <input type="password" placeholder="Create a strong password">
            <button class="eye-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <div class="input-box">
            <input type="password" placeholder="Re-enter your password">
            <button class="eye-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
      </div>

      <div class="terms">By continuing you agree to our <span>Terms of Service</span> and <span>Privacy Policy</span></div>
      <button class="btn-primary">Continue</button>

      <div class="divider">
        <div class="divider-line"></div>
        <span>or sign up with</span>
        <div class="divider-line"></div>
      </div>

      <button class="btn-google">
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Continue with Google
      </button>

      <div class="login-link">Already have an account? <span>Log In</span></div>
    </div>
  </div>
  <div class="home-indicator"></div>
</div>
<script>
function drawStar(svgEl, size, color) {
  const s=size/2,outerR=s*0.9,innerR=s*0.37;
  const pts=Array.from({length:8},(_,i)=>{const o=(i*45-90)*Math.PI/180,inn=((i+0.5)*45-90)*Math.PI/180;return `${s+outerR*Math.cos(o)},${s+outerR*Math.sin(o)} ${s+innerR*Math.cos(inn)},${s+innerR*Math.sin(inn)}`;}).join(' ');
  const oct=Array.from({length:8},(_,i)=>{const a=(i*45-22.5)*Math.PI/180;return `${s+s*0.4*Math.cos(a)},${s+s*0.4*Math.sin(a)}`;}).join(' ');
  svgEl.innerHTML=`<circle cx="${s}" cy="${s}" r="${s*.94}" fill="none" stroke="${color}" stroke-width="0.6" stroke-opacity="0.25"/><polygon points="${pts}" fill="${color}" fill-opacity="0.15" stroke="${color}" stroke-width="1"/><polygon points="${oct}" fill="${color}" fill-opacity="0.22" stroke="${color}" stroke-width="0.8"/><circle cx="${s}" cy="${s}" r="${s*.16}" fill="${color}" fill-opacity="0.55"/><circle cx="${s}" cy="${s}" r="${s*.07}" fill="${color}"/>`;
}
drawStar(document.getElementById('logo-star'),28,'#C9921A');
</script>
</body>
</html>
