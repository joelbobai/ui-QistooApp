<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EthiCash – Biometric</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,600;0,700;0,800;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0d1710;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.device{width:402px;height:874px;background:#fff;border-radius:54px;box-shadow:0 0 0 2px #3a3a3a,0 0 0 6px #1a1a1a,0 30px 80px rgba(0,0,0,.6);position:relative;overflow:hidden;}
.dynamic-island{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:126px;height:37px;background:#000;border-radius:20px;z-index:101;}
.home-indicator{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);width:134px;height:5px;background:rgba(0,0,0,.18);border-radius:3px;z-index:100;}
.screen{position:absolute;inset:0;border-radius:54px;overflow:hidden;background:#fff;display:flex;flex-direction:column;}

.header{padding:64px 20px 0;display:flex;flex-direction:column;}
.back-row{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.back-btn{background:none;border:none;cursor:pointer;padding:4px;color:#1C1C1E;display:flex;}
.progress{flex:1;display:flex;gap:4px;}
.progress-seg{flex:1;height:4px;border-radius:100px;}
.step-label{font-family:'Inter',sans-serif;font-size:12px;color:#9B9B9B;font-weight:500;margin-bottom:18px;}

.body-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;text-align:center;gap:0;}

/* Pulse rings */
.rings-wrap{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;margin-bottom:32px;}
.ring{position:absolute;border-radius:50%;border:2px solid rgba(39,174,96,.25);}
.ring1{width:200px;height:200px;animation:pulse1 2s ease-in-out infinite;}
.ring2{width:162px;height:162px;animation:pulse2 2s ease-in-out infinite .4s;}
.fp-circle{width:126px;height:126px;border-radius:50%;background:linear-gradient(135deg,#E8F5E9,#C8E6C9);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(39,174,96,.2);}

@keyframes pulse1{0%,100%{transform:scale(1);opacity:.5;}50%{transform:scale(1.04);opacity:.9;}}
@keyframes pulse2{0%,100%{transform:scale(1);opacity:.6;}50%{transform:scale(1.04);opacity:1;}}

.bio-title{font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:24px;color:#1C1C1E;margin-bottom:10px;}
.bio-sub{font-family:'Inter',sans-serif;font-size:14px;color:#9B9B9B;line-height:22px;margin-bottom:32px;}
.hint{font-family:'Inter',sans-serif;font-size:13px;color:#9B9B9B;margin-bottom:8px;}

.scan-btn{width:100%;height:56px;border-radius:12px;background:#1A6B3C;border:none;color:#fff;font-family:'Plus Jakarta Sans',sans-serif;font-weight:700;font-size:16px;cursor:pointer;box-shadow:0 4px 16px rgba(26,107,60,.28);margin-bottom:12px;}
.skip-link{font-family:'Inter',sans-serif;font-size:13px;color:#9B9B9B;cursor:pointer;}

/* Mode toggle (prototype helper) */
.mode-toggle{display:flex;gap:8px;margin-bottom:28px;}
.mode-btn{padding:6px 16px;border-radius:20px;border:1.5px solid #E0E0E0;background:#fff;font-family:'Inter',sans-serif;font-size:12px;color:#9B9B9B;cursor:pointer;}
.mode-btn.active{border-color:#27AE60;color:#27AE60;background:#E8F5E9;}
</style>
</head>
<body>
<div class="device">
  <div class="dynamic-island"></div>
  <div class="screen">
    <div class="header">
      <div class="back-row">
        <button class="back-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M5 12l7 7M5 12l7-7"/></svg>
        </button>
        <div class="progress">
          <div class="progress-seg" style="background:#27AE60;"></div>
          <div class="progress-seg" style="background:#27AE60;"></div>
          <div class="progress-seg" style="background:#27AE60;"></div>
        </div>
      </div>
      <div class="step-label">Step 3 of 3 — Biometric Setup</div>
    </div>

    <div class="body-area">
      <div class="mode-toggle">
        <button class="mode-btn active">Fingerprint</button>
        <button class="mode-btn">Face ID</button>
      </div>

      <div class="rings-wrap">
        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <div class="fp-circle">
          <!-- Fingerprint SVG -->
          <svg width="60" height="60" viewBox="0 0 60 60" fill="none">
            <path d="M30 8C19 8 10 17 10 28" stroke="#27AE60" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M50 28C50 17 41 8 30 8" stroke="#27AE60" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M14 36C13 33 12 31 12 28C12 18 20 11 30 11" stroke="#27AE60" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M30 11C40 11 48 18 48 28C48 31 47 34 46 36" stroke="#27AE60" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M18 42C16 39 15 34 15 28C15 21 22 15 30 15" stroke="#27AE60" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M30 15C38 15 45 21 45 28C45 34 44 38 42 42" stroke="#27AE60" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M22 47C21 44 20 40 20 36C20 27 24 22 30 22" stroke="#27AE60" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M30 22C36 22 40 27 40 36C40 40 39 44 38 47" stroke="#27AE60" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M26 50C25 47 25 43 25 40C25 36 27 32 30 32" stroke="#27AE60" stroke-width="2.5" stroke-linecap="round"/>
            <path d="M30 32C33 32 35 35 35 40C35 43 35 47 34 50" stroke="#27AE60" stroke-width="2.5" stroke-linecap="round"/>
          </svg>
        </div>
      </div>

      <div class="bio-title">Touch to Verify</div>
      <div class="bio-sub">Place your finger on the sensor to complete identity verification and secure your account</div>

      <div class="hint">Position your finger on the home button</div>

      <div style="width:100%;">
        <button class="scan-btn">Scan Fingerprint</button>
        <div style="text-align:center;" class="skip-link">Use PIN instead</div>
      </div>
    </div>
  </div>
  <div class="home-indicator"></div>
</div>
</body>
</html>
